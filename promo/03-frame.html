<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="promo.css"></head>
<body>
  <div class="tile">
    <div class="head">
      <div class="brandrow"><img src="../icons/icon128.png" alt=""><b>Catsnip</b></div>
      <div class="headline">Make it look great</div>
      <div class="sub">Drop your snip on a background — rounded corners, soft shadow.</div>
    </div>
    <div class="stage">
      <div class="window" style="width: 980px; height: 540px;">
        <div class="winbar"><span class="dot r"></span><span class="dot y"></span><span class="dot g"></span><div class="addr">Catsnip — Editor</div></div>
        <div class="estage" style="background: #f6f7fb;">
          <!-- the beautify background frame -->
          <div class="beauty" style="width: 760px; height: 420px; padding: 56px; background: linear-gradient(135deg, #fb7185, #f59e0b);">
            <div class="inner" style="width: 100%; height: 100%;">
              <div class="shot">
                <div class="sh-band"></div>
                <div class="sh-title"></div>
                <div class="sh-line m"></div><div class="sh-line"></div><div class="sh-line s"></div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body></html>
