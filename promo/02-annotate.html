<!DOCTYPE html>
<html lang="en"><head><meta charset="UTF-8"><link rel="stylesheet" href="promo.css"></head>
<body>
  <div class="tile">
    <div class="head">
      <div class="brandrow"><img src="../icons/icon128.png" alt=""><b>Catsnip</b></div>
      <div class="headline">Mark it up in seconds</div>
      <div class="sub">Arrows, shapes, text, highlighter, and blur — all editable.</div>
    </div>
    <div class="stage">
      <div class="window" style="width: 1060px; height: 560px;">
        <div class="etool">
          <div class="ebtn"><svg viewBox="0 0 24 24"><path d="M5 3l7 16 2.5-6.5L21 10z"/></svg></div>
          <div class="ebtn"><svg viewBox="0 0 24 24"><path d="M6 2v16h16M2 6h16v16"/></svg></div>
          <div class="esep"></div>
          <div class="ebtn on"><svg viewBox="0 0 24 24"><path d="M5 19L19 5M19 5h-7M19 5v7"/></svg></div>
          <div class="ebtn"><svg viewBox="0 0 24 24"><rect x="4" y="6" width="16" height="12" rx="1"/></svg></div>
          <div class="ebtn"><svg viewBox="0 0 24 24"><ellipse cx="12" cy="12" rx="8" ry="6"/></svg></div>
          <div class="ebtn"><svg viewBox="0 0 24 24"><path d="M4 20c3 0 3-4 6-4s3 4 6 4M14 4l6 6L8 22l-6 0 0-6z"/></svg></div>
          <div class="ebtn"><svg viewBox="0 0 24 24"><path d="M4 20h16M5 16l3 3 9-9-3-3-9 9z"/></svg></div>
          <div class="ebtn"><svg viewBox="0 0 24 24"><path d="M5 6h14M12 6v13M9 19h6"/></svg></div>
          <div class="ebtn"><svg viewBox="0 0 24 24"><rect x="4" y="4" width="16" height="16" rx="2"/><path d="M8 8h.01M12 8h.01M16 8h.01M8 12h.01M12 12h.01M16 12h.01M8 16h.01M12 16h.01M16 16h.01"/></svg></div>
          <div class="espacer"></div>
          <div class="epill ghost">Grab&nbsp;text</div>
          <div class="epill primary">Save</div>
        </div>
        <div class="estage">
          <div class="canvaswrap" style="width: 660px; height: 400px;">
            <div class="shot">
              <div class="sh-band"></div>
              <div class="sh-title"></div>
              <div class="sh-line m"></div><div class="sh-line"></div><div class="sh-line s"></div>
            </div>
            <!-- annotations -->
            <div class="a-rect" style="left: 360px; top: 28px; width: 250px; height: 110px;"></div>
            <div class="a-arrow" style="left: 150px; top: 150px;">
              <svg width="210" height="130" viewBox="0 0 210 130"><g stroke="#ef4444" stroke-width="7" fill="#ef4444" stroke-linecap="round" stroke-linejoin="round"><line x1="10" y1="120" x2="180" y2="22"/><path d="M180 22 L150 26 L168 50 Z"/></g></svg>
            </div>
            <div class="a-text" style="left: 70px; top: 250px;">Look here ✦</div>
            <div class="a-hi" style="left: 22px; top: 300px; width: 300px; height: 22px;"></div>
            <div class="a-blur" style="left: 22px; top: 336px; width: 230px; height: 26px;"></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</body></html>
