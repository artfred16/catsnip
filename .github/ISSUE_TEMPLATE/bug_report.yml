name: Bug report
description: Report a problem with Catsnip
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting a bug in **Catsnip**! Please fill in the details below so it can be reproduced and fixed.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      description: Exact steps so it can be reproduced.
      placeholder: |
        1. …
        2. …
        3. …
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What did you expect to happen instead?
    validations:
      required: false
  - type: input
    id: version
    attributes:
      label: Catsnip version
      description: Shown on chrome://extensions.
      placeholder: e.g. 1.0.0
    validations:
      required: false
  - type: input
    id: environment
    attributes:
      label: Browser & OS
      placeholder: e.g. Chrome 126 on macOS 14
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Screenshots or console errors
      description: Optional. Drag in screenshots, or paste any errors from the browser's DevTools console.
    validations:
      required: false
