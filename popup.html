<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="stylesheet" href="popup.css" />
  <title>Catsnip</title>
</head>
<body>
  <header class="app-header">
    <div class="brand">
      <img src="icons/icon32.png" alt="" class="brand-logo" />
      <div>
        <h1>Catsnip</h1>
        <p class="tagline" id="page-host">Capture, mark up, and save</p>
      </div>
    </div>
  </header>

  <main>
    <section class="modes">
      <span class="group-label">In the browser</span>
      <button class="mode" data-mode="region" type="button">
        <svg viewBox="0 0 24 24" class="mode-icon" aria-hidden="true"><path d="M4 8V5a1 1 0 0 1 1-1h3M16 4h3a1 1 0 0 1 1 1v3M20 16v3a1 1 0 0 1-1 1h-3M8 20H5a1 1 0 0 1-1-1v-3"/></svg>
        <span class="mode-text"><strong>Snip region</strong><small>Drag a box anywhere on the page</small></span>
        <kbd id="region-kbd"></kbd>
      </button>
      <button class="mode" data-mode="visible" type="button">
        <svg viewBox="0 0 24 24" class="mode-icon" aria-hidden="true"><rect x="3" y="4" width="18" height="13" rx="1.5"/><path d="M8 20h8"/></svg>
        <span class="mode-text"><strong>Visible area</strong><small>Capture what's on screen now</small></span>
      </button>
      <button class="mode" data-mode="fullpage" type="button">
        <svg viewBox="0 0 24 24" class="mode-icon" aria-hidden="true"><rect x="5" y="3" width="14" height="18" rx="1.5"/><path d="M9 7h6M9 11h6M9 15h4"/></svg>
        <span class="mode-text"><strong>Full page</strong><small>Scroll &amp; stitch the whole page</small></span>
      </button>

      <span class="group-label">Outside the browser</span>
      <button class="mode" data-mode="desktop" type="button">
        <svg viewBox="0 0 24 24" class="mode-icon" aria-hidden="true"><rect x="2" y="4" width="20" height="13" rx="1.5"/><path d="M7 20h10M9.5 17l-.5 3M14.5 17l.5 3"/></svg>
        <span class="mode-text"><strong>Screen or window</strong><small>Any app — even with the browser hidden</small></span>
      </button>
    </section>

    <p id="note" class="status-text" hidden></p>

    <footer class="app-footer">
      Everything stays on your device · Made by
      <a href="https://artfred16.github.io" target="_blank" rel="noopener noreferrer">artfred16</a>
    </footer>
  </main>

  <script src="popup.js"></script>
</body>
</html>
